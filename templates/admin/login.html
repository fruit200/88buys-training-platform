<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 阿里系供应链直签服务商精英培训会</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card auth-card-admin">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="88buys" class="auth-logo-img">
                <h1>管理后台</h1>
                <p class="auth-subtitle">阿里系供应链直签服务商精英培训会</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}"><span>{{ message }}</span></div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('admin_login') }}" class="auth-form">
                <div class="form-group">
                    <label for="username">管理员账号</label>
                    <input type="text" id="username" name="username" placeholder="请输入管理员账号" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="padding:12px;font-size:0.95rem;margin-top:4px;">登 录</button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('login') }}" class="admin-link">&larr; 返回用户登录</a>
            </div>
        </div>
        <p style="text-align:center;margin-top:20px;font-size:0.75rem;color:var(--text-tertiary);opacity:0.7;">
            &copy; 2026 88buys 采发发 &middot; 阿里系供应链直签服务商
        </p>
    </div>
</body>
</html>
