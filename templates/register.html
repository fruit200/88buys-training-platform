<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完善信息 - 阿里系供应链直签服务商精英培训会</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">✍️</div>
                <h1>完善个人信息</h1>
                <p class="auth-subtitle">首次登录，请完善以下信息</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}"><span>{{ message }}</span></div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="phone-display">
                <span>手机号：</span>
                <strong>{{ phone }}</strong>
            </div>

            <form method="POST" action="{{ url_for('register') }}" class="auth-form">
                <div class="form-group">
                    <label for="name">姓名 <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="请输入真实姓名" required autofocus>
                </div>
                <div class="form-group">
                    <label for="company">公司名称</label>
                    <input type="text" id="company" name="company" placeholder="请输入公司名称">
                </div>
                <div class="form-group">
                    <label for="position">职位</label>
                    <input type="text" id="position" name="position" placeholder="请输入职位">
                </div>
                <button type="submit" class="btn btn-primary btn-block">完成注册</button>
            </form>
        </div>
    </div>
</body>
</html>
